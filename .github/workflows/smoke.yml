name: Smoke tests — Vercel preview

on:
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Playwright smoke (@tomanni-smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium --with-deps

      - name: Install Playwright system deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Get Vercel preview URL
        id: vercel_preview
        run: |
          # Build the preview URL from the branch name — Vercel's naming convention
          BRANCH="${{ github.head_ref }}"
          # Replace / and _ with - and lowercase
          SLUG=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/-\+/-/g' | sed 's/^-//;s/-$//')
          # Truncate to fit Vercel's URL limit
          SLUG=$(echo "$SLUG" | cut -c1-63)
          PREVIEW_URL="https://tomani-wear-git-${SLUG}-tomanni-wear.vercel.app"
          echo "url=$PREVIEW_URL" >> $GITHUB_OUTPUT
          echo "Preview URL: $PREVIEW_URL"

      - name: Wait for Vercel deployment to complete
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Vercel posts a commit STATUS (not a check-run) — poll that API.
          # The statuses endpoint returns newest-first, so .[0] is the latest.
          # We wait for state=success before running tests so we never test
          # against a stale deployment that was already live at HTTP 200.
          echo "Waiting for Vercel status on ${{ github.sha }}"
          for i in $(seq 1 60); do
            STATE=$(gh api \
              "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
              --jq '[.[] | select(.context == "Vercel")] | .[0].state // empty' \
              2>/dev/null)
            echo "Attempt $i: state=${STATE:-none}"
            if [ "$STATE" = "success" ]; then
              echo "Vercel deployment complete!"
              exit 0
            fi
            sleep 10
          done
          echo "Timed out waiting for Vercel"
          exit 1

      - name: Run smoke tests against preview
        run: pnpm exec playwright test --grep "smoke" --project="Desktop Chrome"
        env:
          BASE_URL: ${{ steps.vercel_preview.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

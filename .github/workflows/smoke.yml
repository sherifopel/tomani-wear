name: Smoke tests — Vercel preview

on:
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Playwright smoke (@tomanni-smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Wait for Vercel preview to be ready
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.2
        id: vercel_preview
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          vercel_token: ${{ secrets.VERCEL_TOKEN }}
          max_timeout: 300

      - name: Run smoke tests against preview
        run: npx playwright test --grep @tomanni-smoke --project="Desktop Chrome"
        env:
          BASE_URL: ${{ steps.vercel_preview.outputs.url }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
